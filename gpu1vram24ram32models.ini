[*]
n-gpu-layers = auto
fit = on
fit-target = 512
ctx-size = 70000
parallel = 1
threads = 10
batch-size = 4096
ubatch-size = 2048
cont-batching = true
flash-attn = true
numa = distribute
cache-idle-slots = true
prio = 2
poll = 30
sleep-idle-seconds = 1000
temp = 1.0
top-k = 20
top-p = 0.95
min-p = 0.0
presence-penalty = 0.0
repeat-penalty = 1.08
repeat-last-n = 4096
frequency-penalty = 0.0
reasoning = auto
reasoning-format = deepseek
reasoning-budget = 4096
cache-type-k = q8_0
cache-type-v = q8_0
mmap = false

[qwen3.6]
model = models/qwen3.6/Qwen3.6-27B-UD-Q4_K_XL.gguf
spec-type = draft-mtp
spec-draft-n-max = 3
spec-draft-n-min = 1
spec-draft-p-min = 0.75

[qwen3.6-vision]
model = models/qwen3.6/Qwen3.6-27B-UD-Q4_K_XL.gguf
mmproj = models/qwen3.6/mmproj-F16.gguf
spec-type = draft-mtp
spec-draft-n-max = 3
spec-draft-n-min = 1
spec-draft-p-min = 0.75

[gemma-4]
model = models/gemma-4/gemma-4-26B_q4_0-it.gguf
spec-type = ngram-mod
spec-ngram-mod-n-match = 24
spec-draft-n-min = 4
spec-draft-n-max = 32
temp = 1
top-k = 64
top-p = 0.95
min-p = 0.00
presence-penalty = 0.0
repeat-penalty = 1.0
batch-size = 1024
ubatch-size = 512

[gemma-4-vision]
model = models/gemma-4/gemma-4-26B_q4_0-it.gguf
mmproj = models/gemma-4/gemma-4-26B-it-mmproj.gguf
temp = 1
top-k = 64
top-p = 0.95
min-p = 0.00
presence-penalty = 0.0
repeat-penalty = 1.0
spec-type = ngram-mod
spec-ngram-mod-n-match = 24
spec-draft-n-min = 4
spec-draft-n-max = 32
batch-size = 1024
ubatch-size = 512

[coder-qwen3.6]
model = models/qwen3.6/Qwen3.6-27B-UD-Q4_K_XL.gguf
temp = 0.60
top-k = 20
top-p = 0.95
min-p = 0.00
repeat-penalty = 1.08
presence-penalty = 0.0
spec-type = draft-mtp
spec-draft-n-max = 3
spec-draft-n-min = 1
spec-draft-p-min = 0.75

[codgemma-4]
model = models/gemma-4/gemma-4-26B_q4_0-it.gguf
temp = 1.5
