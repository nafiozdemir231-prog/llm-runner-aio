[*]
n-gpu-layers = auto
fit = on
fit-target = 512
ctx-size = 70000
parallel = 1
threads = 10
batch-size = 4096
ubatch-size = 2048
cont-batching = true
flash-attn = true
numa = distribute
cache-idle-slots = true
prio = 2
poll = 30
sleep-idle-seconds = 1000
temp = 1.0
top-k = 20
top-p = 0.95
min-p = 0.0
presence-penalty = 0.0
repeat-penalty = 1.08
repeat-last-n = 4096
frequency-penalty = 0.0
reasoning = auto
reasoning-format = deepseek
reasoning-budget = 4096
cache-type-k = q8_0
cache-type-v = q8_0
mmap = false

[gemma-4-e4b]
model = models/gemma-4-e4b/gemma-4-E4B_q4_0-it.gguf
temp = 1
top-k = 64
top-p = 0.95
min-p = 0.00
presence-penalty = 0.0
repeat-penalty = 1.0
spec-type = ngram-mod
spec-ngram-mod-n-match = 16
spec-draft-n-min = 4
spec-draft-n-max = 32

